name: Label Release PRs

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main
    paths:
      - 'whats-new.adoc'

jobs:
  check-release:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v44
        with:
          files: whats-new.adoc

      - name: Check for new include in whats-new.adoc
        id: check-include
        if: steps.changed-files.outputs.any_changed == 'true'
        run: |
          # Get the diff of whats-new.adoc
          git fetch origin ${{ github.base_ref }}
          git diff origin/${{ github.base_ref }}...HEAD -- whats-new.adoc > diff.txt
          
          # Check if the diff contains a new include line (starts with +include::_whatsnew/)
          if grep -q "^+include::_whatsnew/" diff.txt; then
            echo "new_include=true" >> $GITHUB_OUTPUT
            echo "Found new include statement in whats-new.adoc"
          else
            echo "new_include=false" >> $GITHUB_OUTPUT
            echo "No new include statement found"
          fi
          
          # Display the diff for debugging
          echo "Diff content:"
          cat diff.txt

      - name: Add Release label
        if: steps.check-include.outputs.new_include == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            try {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels: ['Release']
              });
              console.log('Successfully added Release label');
            } catch (error) {
              console.error('Error adding label:', error);
              // If label doesn't exist, create it first
              if (error.status === 422) {
                console.log('Label does not exist, creating it...');
                try {
                  await github.rest.issues.createLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    name: 'Release',
                    color: '0e8a16',
                    description: 'PR includes a new release in whats-new.adoc'
                  });
                  console.log('Label created successfully');
                  // Try adding the label again
                  await github.rest.issues.addLabels({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: context.issue.number,
                    labels: ['Release']
                  });
                  console.log('Successfully added Release label after creation');
                } catch (createError) {
                  console.error('Error creating label:', createError);
                  throw createError;
                }
              } else {
                throw error;
              }
            }
